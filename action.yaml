name: 'Push Actor to Apify'
description: 'Push and build an Actor to the Apify platform'
branding:
  icon: 'upload-cloud'
  color: 'green'
inputs:
  token:
    description: 'Your Apify token'
    required: true
  actor-id:
    description: 'Name or ID of the Actor to push (e.g. "apify/hello-world" or "E2jjCZBezvAZnX8Rb"). If not provided, the command will create or modify the Actor with the name specified in ".actor/actor.json" file.'
    required: false
    default: ''
  build-tag:
    description: 'Build tag to be applied to the successful Actor build. By default, it is taken from the ".actor/actor.json" file.'
    required: false
    default: ''
  version:
    description: 'Actor version number to which the files should be pushed. By default, it is taken from the ".actor/actor.json" file.'
    required: false
    default: ''
  working-directory:
    description: 'The working directory where the `.actor` folder is located. By default, it is the root of the repository.'
    required: false
    default: ${{ github.workspace }}
outputs:
  build-id:
    description: 'ID of the Actor build triggered by the push'
    value: ${{ steps.push.outputs.build-id }}
  build-number:
    description: 'Version number of the Actor build'
    value: ${{ steps.push.outputs.build-number }}
  build-status:
    description: 'Status of the Actor build (e.g. SUCCEEDED, FAILED)'
    value: ${{ steps.push.outputs.build-status }}
runs:
  using: 'composite'
  steps:
    - name: Check Runner OS
      if: ${{ runner.os != 'Linux' }}
      shell: bash
      run: |
        echo "::error title=⛔ error hint::Support Linux Only"
        exit 1
    - name: Install Apify CLI
      uses: jdx/mise-action@v2
      with:
        version: 2025.8.13
        mise_toml: |
          [settings]
          idiomatic_version_file_enable_tools = []

          [tools]
          "ubi:apify/apify-cli" = { version = "1.3.0", matching = "apify", exe = "apify" }
    - name: Make sure that Apify CLI is logged in
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.token }}"
        apify login -t ${{ inputs.token }}
    - name: Push the Actor
      id: push
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        push_args=()

        if [ -n "${{ inputs.actor-id }}" ]; then
          push_args+=(${{ inputs.actor-id }})
        fi

        if [ -n "${{ inputs.build-tag }}" ]; then
          push_args+=(--build-tag=${{ inputs.build-tag }})
        fi

        if [ -n "${{ inputs.version }}" ]; then
          push_args+=(--version=${{ inputs.version }})
        fi

        build_json=$(apify push --json "${push_args[@]}")
        echo "build-id=$(echo "$build_json" | jq -r '.id')" >> "$GITHUB_OUTPUT"
        echo "build-number=$(echo "$build_json" | jq -r '.buildNumber')" >> "$GITHUB_OUTPUT"
        build_status=$(echo "$build_json" | jq -r '.status')
        echo "build-status=$build_status" >> "$GITHUB_OUTPUT"
        if [ "$build_status" != "SUCCEEDED" ]; then
          echo "::error::Actor build finished with status: $build_status"
          exit 1
        fi
