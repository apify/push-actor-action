name: 'Push Actor to Apify'
description: 'Push and build an Actor to the Apify platform'
branding:
  icon: 'upload-cloud'
  color: 'green'
inputs:
  token:
    description: 'Your Apify token'
    required: true
  actor-id:
    description: 'Name or ID of the Actor to push (e.g. "apify/hello-world" or "E2jjCZBezvAZnX8Rb"). If not provided, the command will create or modify the Actor with the name specified in ".actor/actor.json" file.'
    required: false
    default: ''
  build-tag:
    description: 'Build tag to be applied to the successful Actor build. By default, it is taken from the ".actor/actor.json" file.'
    required: false
    default: ''
  version:
    description: 'Actor version number to which the files should be pushed. By default, it is taken from the ".actor/actor.json" file.'
    required: false
    default: ''
  working-directory:
    description: 'The working directory where the `.actor` folder is located. By default, it is the root of the repository.'
    required: false
    default: ${{ github.workspace }}
outputs:
  build-id:
    description: 'ID of the Actor build triggered by the push'
    value: ${{ steps.push.outputs.build-id }}
  build-number:
    description: 'Version number of the Actor build'
    value: ${{ steps.push.outputs.build-number }}
  build-status:
    description: 'Status of the Actor build (e.g. SUCCEEDED, FAILED)'
    value: ${{ steps.push.outputs.build-status }}
runs:
  using: 'composite'
  steps:
    - name: Check Runner OS
      if: ${{ runner.os != 'Linux' }}
      shell: bash
      run: |
        echo "::error title=⛔ error hint::Support Linux Only"
        exit 1
    - name: Set up Apify CLI
      uses: apify/setup-apify-cli-action@v1
      with:
        token: ${{ inputs.token }}
    - name: Push the Actor
      id: push
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        push_args=()

        if [ -n "${{ inputs.actor-id }}" ]; then
          push_args+=(${{ inputs.actor-id }})
        fi

        if [ -n "${{ inputs.build-tag }}" ]; then
          push_args+=(--build-tag=${{ inputs.build-tag }})
        fi

        if [ -n "${{ inputs.version }}" ]; then
          push_args+=(--version=${{ inputs.version }})
        fi

        build_json_file=$(mktemp)
        # Write JSON to a temp file instead of capturing in a bash variable
        # to avoid truncation issues with large outputs (e.g. embedded readmes)
        #
        # --wait-for-finish makes `apify push` block until the build reaches a
        # terminal status. Without it, the command can return while the build is
        # still RUNNING, making the status check below fail spuriously.
        #
        # An explicit value (in seconds) is required: passing the bare
        # `--wait-for-finish` flag is ambiguous to the CLI's argument parser and
        # would swallow the next positional (the actor-id) as its value. 999999s
        # (~11.5 days) far exceeds any GitHub Actions or Apify build timeout, so
        # in practice it waits until the build finishes.
        apify push --json --wait-for-finish=999999 "${push_args[@]}" > "$build_json_file"

        if ! jq empty "$build_json_file" 2>/dev/null; then
          echo "::error::Failed to parse JSON output from 'apify push'. Output was:"
          cat "$build_json_file" >&2
          rm -f "$build_json_file"
          exit 1
        fi

        echo "build-id=$(jq -r '.id' "$build_json_file")" >> "$GITHUB_OUTPUT"
        echo "build-number=$(jq -r '.buildNumber' "$build_json_file")" >> "$GITHUB_OUTPUT"
        build_status=$(jq -r '.status' "$build_json_file")
        rm -f "$build_json_file"
        echo "build-status=$build_status" >> "$GITHUB_OUTPUT"
        if [ "$build_status" != "SUCCEEDED" ]; then
          echo "::error::Actor build finished with status: $build_status"
          exit 1
        fi
